name: Update Package
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check upstream for updates
        id: check
        run: |
          UPSTREAM_REPO="https://github.com/tosuapp/tosu"
          
          git clone --bare "$UPSTREAM_REPO" /tmp/upstream
          cd /tmp/upstream
          
          COMMIT_COUNT=$(git rev-list --count HEAD)
          SHORT_HASH=$(git rev-parse --short HEAD)
          NEW_PKGVER="r${COMMIT_COUNT}.${SHORT_HASH}"
          
          echo "new_pkgver=$NEW_PKGVER" >> $GITHUB_OUTPUT
          
          cd $GITHUB_WORKSPACE
          CURRENT_PKGVER=$(grep "^pkgver=" PKGBUILD | cut -d'=' -f2)
          echo "current_pkgver=$CURRENT_PKGVER" >> $GITHUB_OUTPUT
          
          if [ "$NEW_PKGVER" != "$CURRENT_PKGVER" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "🆕 Update needed: $CURRENT_PKGVER → $NEW_PKGVER"
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
            echo "✅ Already up to date: $CURRENT_PKGVER"
          fi

      - name: Update PKGBUILD
        if: steps.check.outputs.needs_update == 'true'
        run: |
          cd $GITHUB_WORKSPACE
          sed -i "s/^pkgver=.*/pkgver=${{ steps.check.outputs.new_pkgver }}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          
          echo "Updated PKGBUILD:"
          grep -E "^(pkgver|pkgrel)=" PKGBUILD

      - name: Update checksums and .SRCINFO
        if: steps.check.outputs.needs_update == 'true'
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/pkg" archlinux:latest bash -c '
            set -e
          
            # Update system and install dependencies
            pacman -Syu --noconfirm base-devel git pacman-contrib
          
            # Create non-root user for makepkg
            useradd -m -G wheel builduser
            echo "builduser ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          
            # Give builduser ownership of the package directory
            chown -R builduser:builduser /pkg
          
            # Switch to builduser and update package files
            cd /pkg
            sudo -u builduser bash -c "
              updpkgsums
              makepkg --printsrcinfo > .SRCINFO
            "
          '
          
          # Fix permissions for GitHub Actions
          sudo chown -R $USER:$USER $GITHUB_WORKSPACE

      - name: Commit and push
        if: steps.check.outputs.needs_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${{ steps.check.outputs.new_pkgver }}"
          git push

      - name: Publish to AUR
        if: steps.check.outputs.needs_update == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.1
        with:
          pkgname: tosu-git
          pkgbuild: ./PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ steps.check.outputs.new_pkgver }}"
